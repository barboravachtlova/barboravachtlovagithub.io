<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Niki a Anička</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, purple, blue, pink);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
      z-index: 1;
    }

    a.home-link {
      margin-top: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-size: 1.2em;
      backdrop-filter: blur(5px);
      transition: 0.3s;
      z-index: 1;
    }

    a.home-link:hover {
      background: rgba(255,255,255,0.4);
    }

    .items {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .item {
      position: absolute;
      top: -10%;
      font-size: 20px;
      animation: fall linear infinite;
      cursor: pointer;
      color: white;
    }

    @keyframes fall {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }

    .message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255,255,255,0.9);
      color: #333;
      padding: 15px 25px;
      border-radius: 20px;
      font-size: 18px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <h1>💜 Niki a Anička jsou nejlepší 💙💖</h1>

  <a href="index.html" class="home-link">🏠 Domovská stránka</a>

  <!-- Padající jména -->
  <div class="items" id="items"></div>

  <!-- Zpráva -->
  <div id="message" class="message"></div>

  <script>
    const container = document.getElementById("items");
    const message = document.getElementById("message");

    function createItem() {
      const item = document.createElement("div");
      item.classList.add("item");

      // Náhodně Niki nebo Anička
      const isNiki = Math.random() > 0.5;
      item.innerText = isNiki ? "Niki" : "Anička";

      item.style.left = Math.random() * 100 + "vw";
      item.style.animationDuration = (5 + Math.random() * 5) + "s";

      // Kliknutí
      item.addEventListener("click", () => {
        if (item.innerText === "Niki") {
          message.innerText = "Niki má ráda čokoládu 🍫";
        } else {
          message.innerText = "Anička má ráda papoušky 🦜";
        }

        message.style.display = "block";

        setTimeout(() => {
          message.style.display = "none";
        }, 2000);
      });

      container.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 10000);
    }

    setInterval(createItem, 500);
  </script>

</body>
</html>
