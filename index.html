<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Barbora Vachtlová</title>

    <!-- Hezké písmo -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffe6f0; /* světle růžová */
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .box {
            background-color: #fff5fa; /* velmi jemná růžová */
            padding: 40px;
            width: 60%;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff69b4; /* světlejší růžová */
            font-size: 45px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            color: #d87093;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Barbora Vachtlová</h1>
        <p>Ahoj jsem Bára a mám ráda Aničku a Niki. 💕</p>
    </div>

</body>
</html>
