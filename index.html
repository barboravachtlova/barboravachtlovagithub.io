<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Barbora Vachtlová</title>

    <!-- Hezké písmo -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6f0;
            font-family: 'Poppins', sans-serif;
            position: relative;
        }

        .item {
            position: absolute;
            top: -10%;
            font-size: 30px;
            animation: fall linear infinite;
            cursor: pointer; /* aby bylo jasné, že se dá kliknout */
        }

        @keyframes fall {
            0% { transform: translateY(0); }
            100% { transform: translateY(110vh); }
        }

        .box {
            background-color: #fff5fa;
            padding: 40px;
            width: 60%;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff69b4;
            font-size: 45px;
            margin-bottom: 20px;
        }

        p {
            font-size: 20px;
            color: #d87093;
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffb6c1;
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 999;
            animation: fade 2s forwards;
        }

        @keyframes fade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            10% { opacity: 1; transform: translateX(-50%) translateY(0); }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</head>
<body>

    <!-- Srdíčka (klikací) -->
    <div class="item heart" style="left:5%; animation-duration: 9s;">💕</div>
    <div class="item heart" style="left:20%; animation-duration: 12s;">💗</div>
    <div class="item heart" style="left:35%; animation-duration: 10s;">💖</div>
    <div class="item heart" style="left:55%; animation-duration: 14s;">💕</div>
    <div class="item heart" style="left:75%; animation-duration: 11s;">💗</div>
    <div class="item heart" style="left:90%; animation-duration: 13s;">💖</div>

    <!-- Normální kafe (neklikací) -->
    <div class="item" style="left:10%; animation-duration: 8s;">☕</div>
    <div class="item" style="left:30%; animation-duration: 15s;">☕</div>
    <div class="item" style="left:50%; animation-duration: 9s;">☕</div>
    <div class="item" style="left:70%; animation-duration: 12s;">☕</div>
    <div class="item" style="left:85%; animation-duration: 10s;">☕</div>

    <div class="box">
        <h1>Barbora Vachtlová</h1>
        <p>Ahoj jsem Bára a mám ráda Aničku a Niki. 💕</p>
    </div>

    <a href="anickaaniki.html">Klikni sem</a>

    <!-- Zpráva -->
    <div id="message" class="message">Dneska ti to sluší! 🌸</div>

    <script>
        const hearts = document.querySelectorAll('.heart');
        const message = document.getElementById('message');

        hearts.forEach(heart => {
            heart.addEventListener('click', () => {
                message.style.display = 'block';
                setTimeout(() => {
                    message.style.display = 'none';
                }, 2000); // zpráva zmizí po 2 sekundách
            });
        });
    </script>

</body>
</html>
